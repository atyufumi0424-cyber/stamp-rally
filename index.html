<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>文化祭QRスタンプラリー</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    
    <style>
        body { font-family: 'Noto Sans JP', sans-serif; -webkit-tap-highlight-color: transparent; }
        .tab-content { display: none; }
        .tab-content.active { display: flex; }
        #tab-scan, #tab-ticket { display: none; flex-direction: column; }
        #tab-scan.active, #tab-ticket.active { display: flex; }
        #tab-stamps { display: none; }
        #tab-stamps.active { display: block; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up { animation: fadeInUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes pulse-soft { 0%, 100% { opacity: 1; } 50% { opacity: 0.8; } }
        .animate-pulse-soft { animation: pulse-soft 2s infinite; }
        .pb-safe { padding-bottom: max(env(safe-area-inset-bottom), 12px); }
        .pt-safe { padding-top: max(env(safe-area-inset-top), 0px); }
    </style>
</head>
<body class="bg-indigo-900 flex justify-center h-screen overflow-hidden">

    <div class="flex flex-col h-full w-full max-w-md bg-white shadow-2xl relative overflow-hidden">
        
        <!-- ヘッダー -->
        <header class="bg-indigo-600 text-white p-4 pt-safe shadow-md z-10 flex justify-between items-center shrink-0">
            <div>
                <h1 class="text-xl font-bold tracking-wider">文化祭スタンプラリー</h1>
                <p class="text-[10px] text-indigo-200">QRコードをかざしてスタンプGET！</p>
            </div>
            <div class="flex items-center bg-indigo-700 px-3 py-1.5 rounded-full border border-indigo-500 shadow-inner">
                <i data-lucide="trophy" class="w-4 h-4 text-yellow-400 mr-1"></i>
                <span id="header-stamp-count" class="font-bold text-sm">0 / 5</span>
            </div>
        </header>

        <!-- メインコンテンツ -->
        <main class="flex-1 relative overflow-y-auto bg-slate-50">
            
            <!-- 1. スキャン（ホーム）画面 -->
            <section id="tab-scan" class="tab-content active p-6 h-full bg-gradient-to-b from-blue-50 to-white items-center justify-center pb-24">
                
                <!-- 初期UI（ボタン） -->
                <div id="start-ui" class="flex flex-col items-center w-full max-w-[300px] animate-fade-in-up">
                    <h2 class="text-2xl font-bold text-indigo-900 mb-2">QRコードを読み取る</h2>
                    <p class="text-sm text-slate-500 text-center mb-8">
                        カメラを起動して、スポットにある<br/>QRコードをかざしてください。
                    </p>

                    <!-- ライブカメラ起動ボタン -->
                    <button onclick="startScanner()" class="group relative bg-indigo-600 text-white w-48 h-48 rounded-full flex flex-col items-center justify-center shadow-[0_10px_25px_rgba(79,70,229,0.4)] hover:-translate-y-1 transition-all duration-300 border-4 border-indigo-300 mb-6">
                        <i data-lucide="scan" class="w-16 h-16 mb-2 group-hover:scale-110 transition-transform duration-300"></i>
                        <span class="font-bold text-xl">カメラを起動</span>
                    </button>

                    <!-- バックアップ（写真から読み込む） -->
                    <div class="bg-white p-4 rounded-xl w-full text-center border border-slate-200 shadow-sm mt-4">
                        <p class="text-[10px] text-slate-500 font-bold mb-2">カメラが動かない・真っ暗な場合はこちら</p>
                        <label class="bg-slate-100 hover:bg-slate-200 text-slate-700 px-4 py-3 rounded-lg font-bold text-sm cursor-pointer flex items-center justify-center w-full transition-colors border border-slate-300">
                            <i data-lucide="image" class="w-4 h-4 mr-2"></i>写真から読み込む
                            <input type="file" accept="image/*" class="hidden" onchange="handleFileUpload(event)">
                        </label>
                    </div>

                    <!-- エラーメッセージ用 -->
                    <div id="scan-error-msg" class="hidden w-full bg-red-50 border border-red-200 text-center p-3 rounded-xl mt-4">
                        <p id="scan-error-text" class="text-red-500 font-bold text-xs"></p>
                    </div>
                </div>

                <!-- スキャン中UI（ライブカメラ） -->
                <div id="scanner-ui" class="hidden w-full flex-col items-center animate-fade-in-up">
                    <h2 class="text-xl font-bold text-indigo-900 mb-4">枠内にQRコードを合わせてください</h2>
                    <div class="relative w-full max-w-[300px] mb-6">
                        <div id="qr-reader" class="w-full bg-black rounded-3xl overflow-hidden border-4 border-indigo-400 shadow-[0_0_15px_rgba(79,70,229,0.3)]"></div>
                        <div class="absolute inset-0 border-[3px] border-white/40 border-dashed rounded-3xl pointer-events-none m-6 animate-pulse-soft"></div>
                    </div>
                    <button onclick="stopScanner()" class="bg-slate-200 hover:bg-slate-300 text-slate-700 px-8 py-3 rounded-full font-bold w-full max-w-[200px] transition-colors shadow-sm flex justify-center items-center">
                        <i data-lucide="x" class="w-4 h-4 mr-1"></i>キャンセル
                    </button>
                </div>

                <!-- ファイル読み込み中のUI -->
                <div id="loading-ui" class="hidden flex-col items-center bg-white p-6 rounded-2xl shadow-sm w-full max-w-[250px] border border-slate-100">
                    <i data-lucide="loader-2" class="w-8 h-8 text-indigo-600 animate-spin mb-3"></i>
                    <p class="font-bold text-indigo-900">QRコードを解析中...</p>
                </div>

            </section>

            <!-- 2. スタンプ帳画面 -->
            <section id="tab-stamps" class="tab-content p-6 h-full bg-[#f8f9fa] overflow-y-auto pb-24">
                <div class="flex flex-col items-center mb-6">
                    <h2 class="text-2xl font-bold text-indigo-900 mb-1">スタンプコレクション</h2>
                    <div class="w-16 h-1 bg-indigo-300 rounded-full mb-2"></div>
                    <p class="text-sm text-slate-500">全5箇所のスポットを巡ろう！</p>
                </div>
                <div id="stamp-list-container" class="flex flex-col space-y-4"></div>
            </section>

            <!-- 3. 特典画面 -->
            <section id="tab-ticket" class="tab-content p-6 h-full bg-slate-900 items-center justify-center text-center pb-24">
                <div id="ticket-unlocked" class="hidden w-full max-w-sm animate-fade-in-up">
                    <div class="relative bg-gradient-to-br from-yellow-300 via-amber-400 to-yellow-600 p-1.5 rounded-[2rem] shadow-[0_0_40px_rgba(251,191,36,0.4)]">
                        <div class="bg-white rounded-[1.7rem] p-8 relative overflow-hidden">
                            <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-red-500 via-yellow-400 to-blue-500"></div>
                            <div class="relative">
                                <i data-lucide="gift" class="w-16 h-16 mx-auto text-amber-500 mb-3 animate-bounce"></i>
                            </div>
                            <p class="text-xs font-bold text-amber-600 tracking-widest mb-1">ALL CLEARED</p>
                            <h2 class="text-3xl font-black text-indigo-900 mb-6 border-b border-slate-200 pb-4">コンプリート特典</h2>
                            <div class="bg-indigo-50 border border-indigo-100 rounded-2xl p-5 mb-6 shadow-inner">
                                <p class="font-bold text-indigo-800 text-xl mb-1">模擬店 100円割引券</p>
                            </div>
                            <p class="text-xs text-slate-500 mb-6 font-medium leading-relaxed">生徒会本部または景品交換所で<br/>この画面を提示してください。</p>
                        </div>
                    </div>
                </div>
                
                <div id="ticket-locked" class="text-white flex flex-col items-center">
                    <div class="w-24 h-24 rounded-full bg-slate-800 border border-slate-700 flex items-center justify-center mb-6 shadow-inner">
                        <i data-lucide="trophy" class="w-10 h-10 text-slate-500"></i>
                    </div>
                    <h2 class="text-2xl font-bold mb-3 tracking-wide">まだ特典はありません</h2>
                    <p class="text-slate-400 mb-10 text-sm leading-relaxed">5つのスポットをすべて回って<br/>スタンプを集めよう！</p>
                    <button onclick="switchTab('scan')" class="bg-indigo-600 hover:bg-indigo-500 text-white px-10 py-3.5 rounded-full font-bold transition-all shadow-[0_0_15px_rgba(79,70,229,0.3)]">
                        QRスキャンに戻る
                    </button>
                </div>
            </section>
        </main>

        <!-- 獲得結果ポップアップ -->
        <div id="result-modal" class="hidden absolute inset-0 bg-slate-900/80 backdrop-blur-sm z-[100] flex items-center justify-center p-4 opacity-0 transition-opacity duration-300">
            <div class="bg-white rounded-3xl p-6 w-full max-w-sm text-center shadow-2xl transform scale-95 transition-transform duration-300 relative" id="result-modal-content">
                <button onclick="closeResultModal()" class="absolute top-4 right-4 bg-slate-100 text-slate-400 hover:bg-slate-200 hover:text-slate-600 rounded-full p-2 transition-colors">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
                <div class="mt-4 mb-6 relative">
                    <div id="modal-emoji" class="text-[5rem] leading-none relative z-10"></div>
                </div>
                <h3 id="modal-title" class="text-2xl font-bold text-indigo-900 mb-3"></h3>
                <p id="modal-desc" class="text-sm text-slate-600 mb-6 leading-relaxed px-2"></p>
                <div id="modal-status-box" class="p-4 rounded-2xl font-bold flex items-center justify-center mb-6 border transition-colors">
                    <i data-lucide="check-circle" class="w-6 h-6 mr-2" id="modal-status-icon"></i>
                    <span id="modal-status-text" class="text-lg"></span>
                </div>
                <button onclick="closeResultModal()" class="bg-indigo-600 hover:bg-indigo-700 text-white w-full py-4 rounded-xl font-bold text-lg shadow-md transition-colors">
                    閉じる
                </button>
            </div>
        </div>

        <!-- ボトムナビゲーション -->
        <nav class="bg-white border-t border-slate-200 flex justify-around px-2 pt-2 z-50 shrink-0 pb-safe shadow-[0_-4px_10px_rgba(0,0,0,0.03)] relative">
            <button onclick="switchTab('scan')" id="nav-scan" class="nav-btn flex flex-col items-center w-1/3 py-2 text-indigo-600 transition-colors">
                <div class="p-1 rounded-xl mb-1 transition-colors group-hover:bg-indigo-50" id="nav-icon-bg-scan"><i data-lucide="scan" class="w-6 h-6"></i></div>
                <span class="text-[10px] font-bold">スキャン</span>
            </button>
            <button onclick="switchTab('stamps')" id="nav-stamps" class="nav-btn flex flex-col items-center w-1/3 py-2 text-slate-400 transition-colors relative">
                <div class="p-1 rounded-xl mb-1 transition-colors" id="nav-icon-bg-stamps"><i data-lucide="map" class="w-6 h-6"></i></div>
                <span id="nav-stamp-badge" class="hidden absolute top-1 right-[28%] bg-red-500 text-white text-[9px] font-bold px-1.5 rounded-full shadow-sm ring-2 ring-white">0</span>
                <span class="text-[10px] font-bold">スタンプ帳</span>
            </button>
            <button onclick="switchTab('ticket')" id="nav-ticket" class="nav-btn flex flex-col items-center w-1/3 py-2 text-slate-400 transition-colors relative">
                <div class="p-1 rounded-xl mb-1 transition-colors" id="nav-icon-bg-ticket"><i data-lucide="ticket" class="w-6 h-6"></i></div>
                <span id="nav-ticket-ping" class="hidden absolute top-2 right-[30%] flex h-3 w-3">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-3 w-3 bg-red-500 border-2 border-white"></span>
                </span>
                <span class="text-[10px] font-bold">特典</span>
            </button>
        </nav>
    </div>

    <!-- 隠しQRリーダー領域（ファイルアップロード用） -->
    <div id="qr-reader-hidden" style="display: none;"></div>

    <script>
        // ==========================================
        // ★★★ ここに先ほど控えたGASのURLを貼り付けます ★★★
        // ==========================================
        const GAS_API_URL = "https://script.google.com/a/macros/e-net.nara.jp/s/AKfycbyB3KbG3cRwDelKkGEVjxyDVvTv_dGQRJcCSgMPFqgkhN87dkMv_q69KI70gnVUiOlt/exec"; 

        const SPOTS = [
            { id: 1, name: "Ichijospot 1", emoji: "🎪", desc: "1年生の模擬店エリア。美味しいチュロスがあります！" },
            { id: 2, name: "Ichijospot 2", emoji: "🎭", desc: "体育館・ステージ発表。ダンス部の公演が行われます。" },
            { id: 3, name: "Ichijospot 3", emoji: "🎨", desc: "文化部展示エリア。写真部や美術部の作品が並びます。" },
            { id: 4, name: "Ichijospot 4", emoji: "🍔", desc: "中庭・飲食スペース。焼きそばやフランクフルトを販売中。" },
            { id: 5, name: "Ichijospot 5", emoji: "👻", desc: "お化け屋敷・アトラクション。悲鳴が絶えない人気スポット。" }
        ];

        let stamps = [];
        let html5QrCode = null; 
        let html5QrCodeFile = null; 
        let isProcessing = false;
        
        // ユーザーを識別するランダムなIDを生成
        let userId = localStorage.getItem('ichijo_festival_user_id');
        if (!userId) {
            userId = 'user_' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('ichijo_festival_user_id', userId);
        }

        function init() {
            const savedData = localStorage.getItem('ichijo_festival_stamps');
            if (savedData) {
                try { stamps = JSON.parse(savedData); } catch (e) { stamps = []; }
            }
            lucide.createIcons();
            updateAllUI();
        }

        // ==========================================
        // カメラ起動の徹底改善（デバイスチェック方式）
        // ==========================================
        function startScanner() {
            document.getElementById('start-ui').classList.add('hidden');
            document.getElementById('scanner-ui').classList.remove('hidden');
            document.getElementById('scanner-ui').classList.add('flex');
            document.getElementById('scan-error-msg').classList.add('hidden');
            isProcessing = false;
            
            // 1. スマホのカメラリストを取得して確認する
            Html5Qrcode.getCameras().then(devices => {
                if (devices && devices.length) {
                    let cameraId = devices[0].id;
                    // 背面（外）カメラを探す
                    for (let i = 0; i < devices.length; i++) {
                        if (devices[i].label.toLowerCase().includes("back") || devices[i].label.toLowerCase().includes("背面")) {
                            cameraId = devices[i].id;
                            break;
                        }
                    }

                    // 2. 確実に見つかったカメラのIDを指定して起動
                    html5QrCode = new Html5Qrcode("qr-reader");
                    html5QrCode.start(
                        cameraId,
                        { fps: 10, qrbox: { width: 220, height: 220 } },
                        (decodedText) => processScanResult(decodedText),
                        (errorMessage) => {} 
                    ).catch((err) => {
                        console.error("Camera start error:", err);
                        stopScanner();
                        showScanError("ブラウザでカメラの権限が拒否されています。<br>設定を見直すか、「写真から読み込む」を使用してください。");
                    });
                } else {
                    stopScanner();
                    showScanError("カメラが見つかりませんでした。「写真から読み込む」を使用してください。");
                }
            }).catch(err => {
                console.error("getCameras error:", err);
                stopScanner();
                showScanError("カメラへのアクセスが拒否されました。<br>「写真から読み込む」を使用してください。");
            });
        }

        function stopScanner() {
            if (html5QrCode) {
                html5QrCode.stop().then(() => {
                    html5QrCode.clear();
                    html5QrCode = null;
                }).catch(err => console.error(err));
            }
            document.getElementById('scanner-ui').classList.add('hidden');
            document.getElementById('scanner-ui').classList.remove('flex');
            document.getElementById('start-ui').classList.remove('hidden');
        }

        // ==========================================
        // 写真から読み込む（バックアップ）
        // ==========================================
        function handleFileUpload(event) {
            if (event.target.files.length === 0) return;
            const file = event.target.files[0];
            
            document.getElementById('start-ui').classList.add('hidden');
            document.getElementById('scan-error-msg').classList.add('hidden');
            const loadingUi = document.getElementById('loading-ui');
            loadingUi.classList.remove('hidden');
            loadingUi.classList.add('flex');
            
            if (html5QrCodeFile) html5QrCodeFile.clear();
            html5QrCodeFile = new Html5Qrcode("qr-reader-hidden");
            
            html5QrCodeFile.scanFile(file, true)
                .then(decodedText => {
                    loadingUi.classList.add('hidden');
                    loadingUi.classList.remove('flex');
                    document.getElementById('start-ui').classList.remove('hidden');
                    event.target.value = '';
                    processScanResult(decodedText);
                })
                .catch(err => {
                    loadingUi.classList.add('hidden');
                    loadingUi.classList.remove('flex');
                    document.getElementById('start-ui').classList.remove('hidden');
                    event.target.value = '';
                    showScanError("QRコードが見つかりません。明るい場所で撮り直してください。");
                });
        }

        function processScanResult(decodedText) {
            if (isProcessing) return;
            const match = decodedText.match(/^ICHIJO_SPOT_(\d+)$/);
            if (match) {
                const spot = SPOTS.find(s => s.id === parseInt(match[1]));
                if (spot) {
                    isProcessing = true;
                    stopScanner();
                    handleStampSuccess(spot);
                } else {
                    showScanError("登録されていないQRコードです。");
                }
            } else {
                showScanError("専用のQRコードではありません。");
            }
        }

        function showScanError(msg) {
            const errorContainer = document.getElementById('scan-error-msg');
            document.getElementById('scan-error-text').innerHTML = `<i data-lucide="alert-circle" class="w-4 h-4 inline mr-1 -mt-1"></i>${msg}`;
            errorContainer.classList.remove('hidden');
            lucide.createIcons();
            setTimeout(() => { errorContainer.classList.add('hidden'); }, 4000);
        }

        // ==========================================
        // スタンプ記録 ＆ GitHubからGASへデータ送信
        // ==========================================
        function sendDataToGAS(action, data) {
            if (!GAS_API_URL || GAS_API_URL.includes("ここにGAS")) return; // URLが設定されていない場合は送信しない

            const payload = { action: action, ...data };

            // GitHub PagesからGASへ通信を飛ばす（Fetch API）
            fetch(GAS_API_URL, {
                method: "POST",
                headers: { "Content-Type": "text/plain" }, // CORS回避のため text/plain にする
                body: JSON.stringify(payload)
            }).then(response => {
                console.log("GASへの送信成功", response);
            }).catch(error => {
                console.error("GASへの送信エラー:", error);
            });
        }

        function handleStampSuccess(spot) {
            const alreadyGot = stamps.includes(spot.id);
            
            if (!alreadyGot) {
                // スマホ内（ローカル）に保存
                stamps.push(spot.id);
                localStorage.setItem('ichijo_festival_stamps', JSON.stringify(stamps));
                updateAllUI();
                openResultModal(spot, 'success');
                
                // ★裏側でGASのAPIへデータを送信★
                sendDataToGAS("saveStamp", {
                    userId: userId,
                    spotId: spot.id,
                    spotName: spot.name,
                    totalStamps: stamps.length
                });
                
                // 全クリ時
                if (stamps.length >= 5) {
                    sendDataToGAS("saveComplete", {
                        userId: userId,
                        totalStamps: stamps.length
                    });

                    setTimeout(() => {
                        closeResultModal();
                        switchTab('ticket');
                    }, 2500);
                }
            } else {
                openResultModal(spot, 'already');
            }
        }

        // --- UI系の処理（変更なし） ---
        function updateAllUI() {
            const count = stamps.length;
            document.getElementById('header-stamp-count').textContent = `${count} / 5`;
            const badge = document.getElementById('nav-stamp-badge');
            if (count > 0) { badge.textContent = count; badge.classList.remove('hidden'); }
            const ping = document.getElementById('nav-ticket-ping');
            if (count >= 5) ping.classList.remove('hidden');
            renderStamps();
            updateTicketScreen();
        }

        function renderStamps() {
            const container = document.getElementById('stamp-list-container');
            container.innerHTML = ''; 
            SPOTS.forEach((spot, index) => {
                const isStamped = stamps.includes(spot.id);
                const card = document.createElement('div');
                card.className = `flex items-center p-4 rounded-2xl border transition-all duration-300 ${isStamped ? 'bg-white border-indigo-200 shadow-md transform hover:-translate-y-1' : 'bg-slate-50 border-slate-200 border-dashed'}`;
                card.innerHTML = `
                    <div class="relative w-16 h-16 rounded-full flex items-center justify-center text-3xl mr-4 flex-shrink-0 transition-all ${isStamped ? 'bg-indigo-50 text-indigo-900' : 'bg-slate-200 opacity-40 grayscale'}">
                        ${spot.emoji}
                        ${!isStamped ? `<span class="absolute text-[10px] font-bold text-slate-500 -bottom-1 bg-white px-2 rounded-full border border-slate-200">No.${spot.id}</span>` : ''}
                    </div>
                    <div class="flex-1 min-w-0">
                        <h3 class="font-bold text-lg truncate ${isStamped ? 'text-indigo-900' : 'text-slate-400'}">${spot.name}</h3>
                        <p class="text-xs mt-1 line-clamp-2 ${isStamped ? 'text-slate-600' : 'text-slate-400'}">${isStamped ? spot.desc : 'まだ見つけていません'}</p>
                    </div>
                    <div class="w-8 flex justify-end">
                        ${isStamped ? `<div class="w-7 h-7 rounded-full bg-green-500 text-white flex items-center justify-center shadow-sm"><i data-lucide="check" class="w-4 h-4 text-white font-bold"></i></div>` : `<div class="w-7 h-7 rounded-full border-2 border-slate-200"></div>`}
                    </div>
                `;
                container.appendChild(card);
            });
            lucide.createIcons();
        }

        function updateTicketScreen() {
            if (stamps.length >= 5) {
                document.getElementById('ticket-unlocked').classList.remove('hidden');
                document.getElementById('ticket-locked').classList.add('hidden');
            } else {
                document.getElementById('ticket-unlocked').classList.add('hidden');
                document.getElementById('ticket-locked').classList.remove('hidden');
            }
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById(`tab-${tabId}`).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(el => el.classList.replace('text-indigo-600', 'text-slate-400'));
            document.querySelectorAll('[id^="nav-icon-bg-"]').forEach(el => el.classList.remove('bg-indigo-50', 'text-indigo-600'));
            const activeNav = document.getElementById(`nav-${tabId}`);
            const activeIconBg = document.getElementById(`nav-icon-bg-${tabId}`);
            if (activeNav) activeNav.classList.replace('text-slate-400', 'text-indigo-600');
            if (activeIconBg) activeIconBg.classList.add('bg-indigo-50', 'text-indigo-600');
            if (tabId !== 'scan') stopScanner();
        }

        function openResultModal(spot, type) {
            document.getElementById('modal-emoji').textContent = spot.emoji;
            document.getElementById('modal-title').textContent = spot.name;
            document.getElementById('modal-desc').textContent = spot.desc;
            const statusBox = document.getElementById('modal-status-box');
            const statusText = document.getElementById('modal-status-text');
            const statusIcon = document.getElementById('modal-status-icon');
            if (type === 'success') {
                statusBox.className = "p-4 rounded-2xl font-bold flex items-center justify-center mb-6 border bg-emerald-50 border-emerald-200 text-emerald-700";
                statusText.textContent = "スタンプを獲得しました！";
                statusIcon.setAttribute('data-lucide', 'check-circle-2');
            } else {
                statusBox.className = "p-4 rounded-2xl font-bold flex items-center justify-center mb-6 border bg-slate-50 border-slate-200 text-slate-600";
                statusText.textContent = "このスタンプは獲得済みです";
                statusIcon.setAttribute('data-lucide', 'info');
            }
            const modal = document.getElementById('result-modal');
            const content = document.getElementById('result-modal-content');
            modal.classList.remove('hidden');
            setTimeout(() => { modal.classList.remove('opacity-0'); content.classList.remove('scale-95'); }, 10);
            lucide.createIcons();
        }

        function closeResultModal() {
            const modal = document.getElementById('result-modal');
            const content = document.getElementById('result-modal-content');
            modal.classList.add('opacity-0');
            content.classList.add('scale-95');
            setTimeout(() => { modal.classList.add('hidden'); }, 300);
        }

        window.onload = init;
    </script>
</body>
</html>
