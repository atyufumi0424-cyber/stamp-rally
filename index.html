<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文化祭スタンプラリー - 設置用QRコード一覧</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- QRコード生成ライブラリ -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans JP', sans-serif; background-color: #f8fafc; }
        .page-break { page-break-after: always; }
        
        @media print {
            body { background-color: white; }
            .no-print { display: none !important; }
            .print-area { padding: 0 !important; margin: 0 !important; max-width: 100% !important; }
            
            /* A4縦サイズにぴったりフィットして改ページするスタイル */
            .print-page {
                height: 100vh;
                page-break-after: always;
                display: flex;
                flex-direction: column;
                justify-content: space-around;
                box-sizing: border-box;
                padding: 3rem !important;
            }
            .qr-card { 
                border: 3px dashed #6366f1 !important; /* 切り取り用の点線 */
                background: white !important;
                padding: 2rem !important;
                height: 43vh !important;
                display: flex;
                flex-direction: column;
                justify-content: space-between;
                box-sizing: border-box;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-4xl mx-auto print-area">
        
        <!-- ヘッダー（印刷時には自動で消えます） -->
        <div class="no-print bg-white p-6 rounded-3xl shadow-lg border border-slate-200 mb-8 flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <h1 class="text-2xl font-bold text-indigo-700 flex items-center mb-1">
                    <span class="mr-2">📍</span>設置用スポットQRコード一覧（全14箇所）
                </h1>
                <p class="text-xs text-slate-500 leading-relaxed">
                    A4用紙1枚につき「2スポットずつ」配置され、切り取り線（点線）でカットしてそのままブースに貼ることができます。<br>
                    全14クラス分のスポットが自動でレイアウトされています（絵文字なしバージョン）。
                </p>
            </div>
            <button onclick="window.print()" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-all flex items-center shrink-0">
                <span class="mr-2">🖨️</span>このまま印刷 / PDF保存
            </button>
        </div>

        <!-- 印刷用グリッド（A4サイズ1枚に2個ずつ綺麗に並びます） -->
        <div id="spots-print-container" class="space-y-12">
            <!-- JavaScriptでここに7ページ分の印刷用ブロックが自動生成されます -->
        </div>

    </div>

    <script>
        // 14箇所のスポット情報（スタンプラリーアプリのデータと完全一致・絵文字なし）
        const SPOTS = [
            { id: 1, name: "1年1組", label: "謎解き迷路", desc: "高校1年生のアトラクションスポット" },
            { id: 2, name: "1年2組", label: "おばけやしき", desc: "高校1年生のアトラクションスポット" },
            { id: 3, name: "1年3組", label: "おばけやしき", desc: "高校1年生のアトラクションスポット" },
            { id: 4, name: "1年4組", label: "キッキングスナイパー", desc: "高校1年生のアトラクションスポット" },
            { id: 5, name: "1年5組", label: "カジノ", desc: "高校1年生のアトラクションスポット" },
            { id: 6, name: "1年6組", label: "遊園地", desc: "高校1年生のアトラクションスポット" },
            { id: 7, name: "1年7組", label: "アーチ", desc: "高校1年生のアトラクションスポット" },
            { id: 8, name: "2年1組", label: "缶バッジ・チェキ", desc: "高校2年生の物品販売・出展ブース" },
            { id: 9, name: "2年2組", label: "ラバーバンド・エコバッグ", desc: "高校2年生の物品販売・出展ブース" },
            { id: 10, name: "2年3組", label: "キーホルダー・ラバーバンド", desc: "高校2年生の物品販売・出展ブース" },
            { id: 11, name: "2年4組", label: "タオル・ステッカー", desc: "高校2年生の物品販売・出展ブース" },
            { id: 12, name: "2年5組", label: "タオル・目印チャーム", desc: "高校2年生の物品販売・出展ブース" },
            { id: 13, name: "2年6組", label: "ヘアバンド・前髪クリップ", desc: "高校2年生の物品販売・出展ブース" },
            { id: 14, name: "2年7組", label: "缶バッジ・クリアボトル", desc: "高校2年生の物品販売・出展ブース" }
        ];

        function generateSpotQRs() {
            const container = document.getElementById('spots-print-container');
            container.innerHTML = '';

            // 2個ずつのペア（A4用紙1枚分）に分けて配置します
            for (let i = 0; i < SPOTS.length; i += 2) {
                const pair = SPOTS.slice(i, i + 2);
                
                // 印刷1ページ分（A4縦）のコンテナ
                const pageBlock = document.createElement('div');
                pageBlock.className = 'print-page bg-white p-8 rounded-[2.5rem] shadow-xl border border-slate-200 max-w-[800px] mx-auto flex flex-col justify-around gap-8';
                
                // 最後のページ以外は印刷用改ページを適用
                if (i + 2 < SPOTS.length) {
                    pageBlock.classList.add('page-break');
                }

                pair.forEach(spot => {
                    const qrText = `ICHIJO_SPOT_${spot.id}`;
                    
                    const card = document.createElement('div');
                    card.className = 'qr-card bg-slate-50 p-8 rounded-3xl border-2 border-indigo-200 flex flex-row items-center justify-between text-left h-[280px] relative';
                    
                    card.innerHTML = `
                        <!-- 左側：ブース情報 -->
                        <div class="flex-1 pr-8 flex flex-col justify-between h-full">
                            <div>
                                <div class="flex items-center space-x-2 mb-2">
                                    <span class="bg-indigo-600 text-white font-black text-sm px-4 py-1.5 rounded-full">${spot.name}</span>
                                </div>
                                <h2 class="text-3xl font-black text-indigo-950 mt-1">${spot.label}</h2>
                                <p class="text-sm text-slate-500 font-bold mt-2 leading-relaxed">${spot.desc}</p>
                            </div>
                            <div class="text-[10px] text-slate-400 font-mono tracking-wider mt-4 font-bold">
                                アプリでカメラを起動し、このQRコードをスキャンしよう！
                            </div>
                        </div>
                        
                        <!-- 右側：QRコード表示領域 -->
                        <div class="flex flex-col items-center justify-center shrink-0 bg-white p-4 rounded-2xl border border-slate-100 shadow-md">
                            <div id="qrcode-${spot.id}"></div>
                        </div>
                    `;
                    
                    pageBlock.appendChild(card);
                });

                container.appendChild(pageBlock);

                // 各スポットのQRコード画像を生成
                pair.forEach(spot => {
                    const qrText = `ICHIJO_SPOT_${spot.id}`;
                    new QRCode(document.getElementById(`qrcode-${spot.id}`), {
                        text: qrText,
                        width: 160,
                        height: 140, 
                        colorDark : "#1e1b4b",
                        colorLight : "#ffffff",
                        correctLevel : QRCode.CorrectLevel.M
                    });
                });
            }
        }

        window.onload = function() {
            generateSpotQRs();
        };
    </script>
</body>
</html>
